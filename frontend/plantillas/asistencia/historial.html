{% extends 'base.html' %}
{% load static %}

{% block title %}Historial - Control de Acceso{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Historial de registros</h4>
</div>

<div class="card border-secondary mb-3">
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label small text-secondary">Fecha</label>
                <select class="form-select" id="fechaHistorial" style="min-width: 260px;"></select>
            </div>
            <div class="col-auto">
                <label class="form-label small text-secondary">ID empleado</label>
                <input type="text" class="form-control" id="filtroId" placeholder="Ej: AER001">
            </div>
            <div class="col-auto">
                <label class="form-label small text-secondary">Nombre</label>
                <input type="text" class="form-control" id="filtroNombre" placeholder="Nombre del empleado">
            </div>
            <div class="col-auto d-flex gap-2">
                <button class="btn btn-primary" id="btnConsultar">Consultar</button>
                <button class="btn btn-success" id="btnExportarExcel">
                    <i class="bi bi-file-earmark-excel"></i> Exportar Excel
                </button>
            </div>
        </div>
    </div>
</div>

<div class="card border-secondary">
    <div class="card-header bg-transparent border-secondary d-flex justify-content-between align-items-center py-2">
        <span class="small">Registros</span>
        <small class="text-secondary" id="infoHistorial"></small>
    </div>
    <div class="table-responsive" style="max-height: 500px; overflow-y: auto;">
        <table class="table table-dark table-hover align-middle mb-0">
            <thead class="sticky-top">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Fecha</th>
                    <th>Entrada</th>
                    <th>Salida</th>
                    <th>Horas</th>
                </tr>
            </thead>
            <tbody id="cuerpoHistorial">
                <tr>
                    <td colspan="6" class="text-secondary text-center py-3">
                        Selecciona una fecha para consultar
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
