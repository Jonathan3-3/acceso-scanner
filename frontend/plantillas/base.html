{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Control de Acceso{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="{% static 'css/estilos.css' %}" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-modern mb-4">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'principal' %}">
                <i class="bi bi-shield-lock fs-4" style="-webkit-text-fill-color: initial; fill: currentColor;"></i>
                <span>Control de Acceso</span>
            </a>
            <div class="d-flex gap-1">
                <a class="nav-link-custom {% if request.path == '/' or '/principal' in request.path %}active{% endif %}" href="{% url 'principal' %}">
                    <i class="bi bi-person-badge me-1"></i>Principal
                </a>
                <a class="nav-link-custom {% if '/general' in request.path %}active{% endif %}" href="{% url 'general' %}">
                    <i class="bi bi-table me-1"></i>General
                </a>
                <a class="nav-link-custom {% if '/hoy' in request.path %}active{% endif %}" href="{% url 'hoy' %}">
                    <i class="bi bi-activity me-1"></i>Hoy
                </a>
            </div>
        </div>
    </nav>

    <main class="container" style="position: relative; z-index: 1;">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer-modern" style="position: relative; z-index: 1;">
        <div class="container">
            <i class="bi bi-fingerprint me-1"></i> Scanner AccessPRO — Control de Asistencia
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/principal.js' %}?v=5"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
